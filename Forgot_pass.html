<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .forgot-pass-container {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .forgot-pass-container h1 {
            color: #d4277e;
            margin-bottom: 20px;
        }
        .forgot-pass-container p {
            color: #555;
            margin-bottom: 20px;
        }
        .forgot-pass-container input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        .forgot-pass-container button {
            background-color: #d4277e;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .forgot-pass-container button:hover {
            background-color: #b02068;
        }
        .forgot-pass-container a {
            display: block;
            margin-top: 10px;
            color: #d4277e;
            text-decoration: none;
        }
        .forgot-pass-container a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="forgot-pass-container">
        <h1>Forgot Password</h1>
        <p>Enter your email address to reset your password.</p>
        <form action="/reset-password" method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <button type="submit" onclick="alert('Check your mail for account confirmation');" >Reset Password</button>
        </form>
        <a href="home.html">Back to Home page</a>
    </div>
</body>
</html>
